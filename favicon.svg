<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Aurora blob gradient: purple → pink -->
    <radialGradient id="blob" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#B260FF"/>
      <stop offset="55%"  stop-color="#FF4D8D"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </radialGradient>
    <clipPath id="roundclip">
      <rect width="32" height="32" rx="8" ry="8"/>
    </clipPath>
  </defs>

  <!-- Rounded-square blob background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#blob)"/>

  <!-- Soft inner glow -->
  <rect width="32" height="32" rx="8" ry="8"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"
        clip-path="url(#roundclip)"/>

  <!-- Bowl body -->
  <ellipse cx="16" cy="21" rx="9" ry="2.2" fill="rgba(255,255,255,0.22)"/>
  <path d="M7.2 18 Q7 26.5 16 26.5 Q25 26.5 24.8 18 Z"
        fill="rgba(255,255,255,0.95)"/>

  <!-- Bowl rim -->
  <rect x="7" y="17" width="18" height="2.2" rx="1.1"
        fill="white"/>

  <!-- Steam wisps -->
  <path d="M12 15 Q11 13 12 11" fill="none" stroke="rgba(255,255,255,0.85)"
        stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16 14.5 Q15 12.5 16 10.5" fill="none" stroke="rgba(255,255,255,0.85)"
        stroke-width="1.2" stroke-linecap="round"/>
  <path d="M20 15 Q19 13 20 11" fill="none" stroke="rgba(255,255,255,0.85)"
        stroke-width="1.2" stroke-linecap="round"/>

  <!-- Noodle squiggles inside bowl -->
  <g clip-path="url(#roundclip)" opacity="0.7">
    <path d="M10 21.5 Q12 20.2 14 21.5 Q16 22.8 18 21.5 Q20 20.2 22 21.5"
          fill="none" stroke="#FFD600" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M11 23 Q13 21.8 15 23 Q17 24.2 19 23 Q21 21.8 22 23"
          fill="none" stroke="#FF8DB8" stroke-width="1.1" stroke-linecap="round"/>
  </g>
</svg>
